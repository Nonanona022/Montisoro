document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"nl\"><head>\n<meta charset=\"UTF-8\">\n<title>Montisoro — Verzuimrapport · Testflow<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<meta name=\"robots\" content=\"noindex,nofollow\">\n\n<style>/* ═══════════════════════════════════════════════════════════════════\n   Montisoro — self-hosted fonts (WOFF2, latin subset, GDPR-conform)\n   Vervangt de Google Fonts CDN (die EU-IP's logt). Bronnen = Fontsource\n   (dezelfde Google-fontdata, SIL Open Font License) → identieke glyphs,\n   géén visueel verschil t.o.v. de vorige CDN-latin-subset.\n   Gewichten = exact wat de live CDN-links serveerden (geen weight-synthese).\n   font-display:swap voorkomt onzichtbare tekst tijdens laden (FOIT→FOUT).\n═══════════════════════════════════════════════════════════════════ */\n\n/* ── Playfair Display (display serif: titels, KPI's, em-cursief) ── */\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:400; font-display:swap;\n  src:url(\"7cdfbdbf-d9c2-4a4b-979e-13ed194a3bcc\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:500; font-display:swap;\n  src:url(\"5f358c00-127a-417c-a38c-ad84c3e0c8a2\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:700; font-display:swap;\n  src:url(\"10979ac3-c245-4a6e-b130-325cef002250\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:900; font-display:swap;\n  src:url(\"db5224d3-8e7e-4236-a7db-d3800d526235\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:italic; font-weight:400; font-display:swap;\n  src:url(\"31b65693-8eb8-4f24-a8be-697053b6263b\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:italic; font-weight:500; font-display:swap;\n  src:url(\"9a2593a3-a857-45a8-a0c4-ea80d8e2bc7e\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:italic; font-weight:700; font-display:swap;\n  src:url(\"3862e4bf-3caa-49ee-a8a6-9fb8ca759c0b\") format('woff2');\n}\n\n/* ── DM Sans (UI sans: body, knoppen, labels) ── */\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:300; font-display:swap;\n  src:url(\"024b008c-3b6f-477e-b349-7cfe632a5231\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:400; font-display:swap;\n  src:url(\"c2c545d6-589f-4638-a4c1-dff92e113541\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:500; font-display:swap;\n  src:url(\"7b6a4dd6-2630-4d2f-8f99-f5ec574b4dfc\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:600; font-display:swap;\n  src:url(\"65ae0687-4576-4a7a-8fa5-ef0fdda4d28f\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:700; font-display:swap;\n  src:url(\"391d92da-aa95-4239-b97e-08e354491a73\") format('woff2');\n}\n\n/* ── DM Mono (eyebrows, KPI-numerals, fineprint via --mono) ── */\n@font-face{\n  font-family:'DM Mono'; font-style:normal; font-weight:400; font-display:swap;\n  src:url(\"0d3ec209-d9d9-4174-a9f9-921c130df5ee\") format('woff2');\n}\n@font-face{\n  font-family:'DM Mono'; font-style:normal; font-weight:500; font-display:swap;\n  src:url(\"73c1bfd3-2e93-44cd-9465-455b71a98c12\") format('woff2');\n}\n<\u002Fstyle>\n<style>\n/* ═══════════════════════════════════════════════════════════════\n   MONTISORO — VERZUIMRAPPORT TESTFLOW  (intern hulpmiddel)\n   Doorloopt dezelfde 6 stappen als de website-calculator, slaat de\n   e-mail/lead-stap over en toont meteen het rapport. Zelfde rekenmotor.\n   GEEN wijziging aan rapport, calculator of backend.\n═══════════════════════════════════════════════════════════════ */\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}\n:root{\n  --bg:#13100D; --bg-2:#1c1814; --panel:#211c17; --line:rgba(240,237,232,0.10);\n  --off:#F0EDE8; --off-mute:rgba(240,237,232,0.55); --off-dim:rgba(240,237,232,0.34);\n  --orange:#E8592B; --orange-soft:rgba(232,89,43,0.14);\n  --good:#5BBE90; --warn:#E8A23B;\n  --serif:'Playfair Display',Georgia,serif;\n  --sans:'DM Sans',-apple-system,sans-serif;\n  --mono:'DM Mono',ui-monospace,monospace;\n}\nhtml,body{height:100%;}\nbody{font-family:var(--sans);background:var(--bg);color:var(--off);min-height:100vh;}\n\n/* ───────── WIZARD SCREEN ───────── */\n.wizard-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:34px 20px 60px;}\n.testbadge{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);border:1px solid var(--orange-soft);background:var(--orange-soft);padding:6px 14px;border-radius:100px;margin-bottom:18px;}\n.testbadge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--orange);}\n.wiz{width:100%;max-width:680px;}\n\n/* stepper */\n.stepper{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:30px;position:relative;}\n.stepper::before{content:'';position:absolute;top:15px;left:6%;right:6%;height:1.5px;background:var(--line);z-index:0;}\n.step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;cursor:pointer;position:relative;z-index:1;background:none;border:0;color:inherit;font-family:inherit;}\n.step .circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 13px var(--mono);background:var(--bg-2);border:1.5px solid var(--line);color:var(--off-mute);transition:all .2s;}\n.step .nm{font-size:10.5px;font-weight:500;color:var(--off-dim);text-align:center;line-height:1.25;max-width:84px;transition:color .2s;}\n.step.done .circle{background:rgba(232,89,43,.18);border-color:var(--orange);color:var(--orange);}\n.step.active .circle{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 0 0 5px var(--orange-soft);}\n.step.active .nm{color:var(--off);}\n\n/* card */\n.card{background:var(--bg-2);border:1px solid var(--line);border-radius:18px;padding:34px 36px 30px;}\n.eyebrow{font-size:9.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);}\n.card h1{font-family:var(--serif);font-weight:700;font-size:28px;letter-spacing:-.02em;margin:7px 0 8px;}\n.card h1 em{font-style:italic;color:var(--orange);}\n.card .lead{font-size:13.5px;line-height:1.6;color:var(--off-mute);max-width:54ch;margin-bottom:26px;}\n\n.panel{display:none;}\n.panel.active{display:block;animation:fade .35s ease;}\n@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}\n\n.field{margin-bottom:22px;}\n.field > label{display:block;font-size:12.5px;font-weight:600;color:var(--off);margin-bottom:4px;}\n.field .hint{font-size:11.5px;color:var(--off-dim);margin-bottom:11px;line-height:1.4;}\n.numwrap{display:flex;align-items:center;gap:10px;}\n.numwrap input{flex:1;min-width:0;font:600 18px var(--mono);color:#fff;background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;transition:border-color .16s;}\n.numwrap input:focus{outline:none;border-color:var(--orange);}\n.numwrap .unit{font-size:12px;color:var(--off-mute);white-space:nowrap;flex:0 0 auto;}\n.numwrap.invalid input{border-color:#D62828;}\n.err{font-size:11.5px;color:#ff7a5c;margin-top:7px;display:none;}\n.err.show{display:block;}\n\n.sliderrow{margin-bottom:20px;}\n.sliderrow .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}\n.sliderrow .top label{font-size:12.5px;font-weight:500;color:var(--off-mute);}\n.sliderrow .val{font:600 15px var(--mono);color:#fff;}\n.sliderrow .val small{font-size:11px;color:var(--off-mute);font-weight:400;}\ninput[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:5px;background:linear-gradient(var(--orange),var(--orange)) no-repeat,var(--line);background-size:var(--p,0%) 100%;cursor:pointer;}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--orange);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4);}\ninput[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--orange);cursor:pointer;}\n\n/* per-kost segmented (arbeider/bediende/beide) */\n.costrow{display:grid;grid-template-columns:1fr auto;gap:12px 16px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(240,237,232,.06);}\n.costrow:last-child{border-bottom:0;}\n.costrow .cl{font-size:13px;font-weight:500;color:var(--off);}\n.costrow .ci{display:flex;align-items:center;gap:8px;}\n.costrow .ci input{width:108px;font:600 14px var(--mono);color:#fff;background:var(--bg);border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;text-align:right;}\n.costrow .ci input:focus{outline:none;border-color:var(--orange);}\n.costrow .ci .u{font-size:11px;color:var(--off-mute);width:34px;}\n.seg{grid-column:1/-1;display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;width:max-content;}\n.seg button{font:500 11px var(--sans);color:var(--off-mute);background:none;border:0;border-radius:6px;padding:6px 13px;cursor:pointer;transition:all .15s;}\n.seg button.on{background:var(--orange);color:#fff;}\n\n.derived{display:flex;gap:24px;margin-top:6px;padding:14px 16px;background:var(--bg);border-radius:11px;}\n.derived div{flex:1;}\n.derived .dl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--off-dim);margin-bottom:5px;}\n.derived .dv{font:600 17px var(--mono);color:#fff;}\n\n.grp-block{margin-bottom:18px;}\n.grp-block > .gh{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--line);}\n\n/* nav */\n.nav{display:flex;align-items:center;gap:12px;margin-top:30px;}\n.nav .spacer{flex:1;}\n.btn{display:inline-flex;align-items:center;gap:8px;font:600 13px var(--sans);border-radius:10px;padding:13px 22px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--off);transition:all .16s;min-height:48px;}\n.btn:hover{border-color:var(--orange);color:#fff;}\n.btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;}\n.btn.primary:hover{background:#cc4a1e;}\n.btn:disabled{opacity:.35;cursor:not-allowed;}\n.btn svg{width:15px;height:15px;}\n\n.quickfill{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:22px;}\n.quickfill .qfl{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--off-dim);margin-right:4px;}\n.quickfill button{font:600 11px var(--sans);color:var(--off);background:var(--panel);border:1px solid var(--line);border-radius:100px;padding:7px 13px;cursor:pointer;transition:all .15s;}\n.quickfill button:hover{border-color:var(--orange);color:#fff;}\n\n.langtop{display:flex;justify-content:flex-end;width:100%;max-width:680px;margin-bottom:14px;}\n.langseg{display:inline-flex;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:4px;gap:3px;}\n.langseg button{font:600 11px var(--sans);color:var(--off-mute);background:none;border:0;border-radius:6px;padding:6px 13px;cursor:pointer;}\n.langseg button.on{background:var(--orange);color:#fff;}\n\n/* ───────── REPORT SCREEN ───────── */\n.report-screen{display:none;height:100vh;flex-direction:column;}\n.report-screen.show{display:flex;}\n.rtopbar{display:flex;align-items:center;gap:12px;padding:0 22px;height:60px;flex:0 0 60px;background:var(--bg-2);border-bottom:1px solid var(--line);}\n.rtopbar .ttl{font-family:var(--serif);font-weight:700;font-size:16px;}\n.rtopbar .ttl em{font-style:italic;color:var(--orange);}\n.rtopbar .zoomctl{display:flex;align-items:center;gap:9px;margin-left:auto;font-size:11px;color:var(--off-mute);}\n.rtopbar .zoomctl input{width:110px;accent-color:var(--orange);}\n.rpanes{flex:1;display:flex;min-height:0;}\n.preview{flex:1;min-width:0;overflow:auto;background:#3a3631;padding:26px 0;}\n.frame-wrap{width:max-content;margin:0 auto;}\niframe#rep{border:0;display:block;width:794px;background:#fff;box-shadow:0 24px 70px -20px rgba(0,0,0,.6);transform-origin:top center;}\n.checks{flex:0 0 350px;background:var(--bg-2);border-left:1px solid var(--line);overflow-y:auto;padding:20px 20px 50px;transition:margin-right .2s;}\n.checks.hidden{margin-right:-350px;}\n.checks h2{font-family:var(--serif);font-weight:700;font-size:16px;margin-bottom:3px;}\n.checks .sub{font-size:11px;color:var(--off-mute);line-height:1.5;margin-bottom:16px;}\n.cgroup{margin-top:18px;}\n.cgroup > .gh{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);padding-bottom:7px;margin-bottom:8px;border-bottom:1px solid var(--line);}\n.crow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:6px 0;border-bottom:1px solid rgba(240,237,232,.05);}\n.crow .ck{font-size:11px;color:var(--off-mute);line-height:1.3;flex:1;}\n.crow .ck small{display:block;font-size:9px;color:var(--off-dim);letter-spacing:.03em;}\n.crow .cv{font:600 12.5px var(--mono);color:#fff;white-space:nowrap;text-align:right;}\n.crow.hero .cv{color:var(--orange);font-size:14px;}\n.pill{display:inline-block;font:600 10px var(--sans);padding:3px 9px;border-radius:100px;}\n.pill.low{background:rgba(91,190,144,.16);color:var(--good);}\n.pill.avg{background:rgba(232,162,59,.16);color:var(--warn);}\n.pill.elevated{background:rgba(232,89,43,.16);color:var(--orange);}\n.pill.high{background:rgba(232,89,43,.24);color:#ff7a4d;}\n.cattbl{width:100%;border-collapse:collapse;margin-top:4px;}\n.cattbl th{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--off-dim);text-align:right;padding:5px 6px;border-bottom:1px solid var(--line);}\n.cattbl th:first-child{text-align:left;}\n.cattbl td{font:500 11.5px var(--mono);padding:6px;text-align:right;border-bottom:1px solid rgba(240,237,232,.05);}\n.cattbl td:first-child{text-align:left;font-family:var(--sans);font-size:11px;color:var(--off-mute);}\n.cattbl td.over{color:#ff7a4d;} .cattbl td.under{color:var(--good);}\n\n::-webkit-scrollbar{width:10px;height:10px;}\n::-webkit-scrollbar-thumb{background:rgba(240,237,232,0.14);border-radius:10px;}\n::-webkit-scrollbar-track{background:transparent;}\n\n@media (max-width:720px){\n  .card{padding:26px 22px 24px;}\n  .step .nm{display:none;}\n  .checks{flex-basis:100%;position:absolute;right:0;top:60px;bottom:0;z-index:5;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ░░░ WIZARD ░░░ -->\n<div class=\"wizard-screen\" id=\"wizScreen\">\n  <div class=\"langtop\">\n    <div class=\"langseg\" id=\"langSeg\">\n      <button data-lang=\"nl\" class=\"on\">Nederlands<\u002Fbutton>\n      <button data-lang=\"en\">English<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <span class=\"testbadge\">Intern · Testflow — geen e-mail, geen opslag<\u002Fspan>\n  <div class=\"wiz\">\n    <div class=\"stepper\" id=\"stepper\"><\u002Fdiv>\n    <div class=\"card\">\n      <div id=\"panels\"><\u002Fdiv>\n      <div class=\"nav\">\n        <button class=\"btn\" id=\"prevBtn\">← Vorige<\u002Fbutton>\n        <div class=\"spacer\"><\u002Fdiv>\n        <button class=\"btn primary\" id=\"nextBtn\">Volgende →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ░░░ REPORT ░░░ -->\n<div class=\"report-screen\" id=\"repScreen\">\n  <div class=\"rtopbar\">\n    <button class=\"btn\" id=\"backBtn\">← Terug naar stappen<\u002Fbutton>\n    <span class=\"ttl\">Uw <em>verzuimrapport<\u002Fem><\u002Fspan>\n    <button class=\"btn\" id=\"openTab\">Open in nieuw tabblad<\u002Fbutton>\n    <button class=\"btn primary\" id=\"toggleChecks\">Cijfercontrole<\u002Fbutton>\n    <div class=\"zoomctl\"><span>Zoom<\u002Fspan><input type=\"range\" id=\"zoom\" min=\"0.35\" max=\"1\" step=\"0.01\" value=\"0.62\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"rpanes\">\n    <div class=\"preview\">\n      <div class=\"frame-wrap\"><iframe id=\"rep\"><\u002Fiframe><\u002Fdiv>\n    <\u002Fdiv>\n    <aside class=\"checks\" id=\"checks\">\n      <h2>Cijfercontrole<\u002Fh2>\n      <p class=\"sub\">Wat de rekenmotor uit uw invoer berekent — en waar het in het rapport verschijnt.<\u002Fp>\n      <div id=\"checkBody\"><\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"3e9fb87d-05b7-4d37-8312-c72fb6164698\"><\u002Fscript>\n<script src=\"c36177a6-53b0-4181-965b-da7ccca734fa\"><\u002Fscript>\n<script>\n(function(){\n  'use strict';\n  var E = window.VerzuimEngine;\n  var $ = function(id){ return document.getElementById(id); };\n\n  /* ── i18n (compact — alleen wat de testflow nodig heeft) ── */\n  var I18N = {\n    nl:{\n      steps:['Organisatie','Brutoloon','Doorlopende kosten','Vervangingskosten','Organisatorische impact','Verzuim'],\n      prev:'← Vorige', next:'Volgende →', see:'Bekijk rapport →',\n      grp:[['arbeider','Arbeiders'],['bediende','Bedienden'],['beide','Beiden']],\n      back:'← Terug naar stappen', opentab:'Open in nieuw tabblad', company:'Voorbeeld NV',\n      errFte:'Vul het aantal medewerkers in om verder te gaan.',\n      errSalary:'Vul het brutoloon in om verder te gaan.',\n      errVerz:'Vul minstens één verzuimpercentage in om het rapport te zien.',\n      pmonth:'/ mnd', pyear:'/ jaar'\n    },\n    en:{\n      steps:['Organisation','Gross salary','Ongoing costs','Replacement costs','Organisational impact','Absence'],\n      prev:'← Back', next:'Next →', see:'View report →',\n      grp:[['arbeider','Blue-collar'],['bediende','White-collar'],['beide','Both']],\n      back:'← Back to steps', opentab:'Open in new tab', company:'Sample Ltd.',\n      errFte:'Enter the number of employees to continue.',\n      errSalary:'Enter t
