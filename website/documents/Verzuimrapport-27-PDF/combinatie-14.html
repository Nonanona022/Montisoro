    var p = document.body || document.documentElement;

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is

      // which transformScriptTags handles unconditionally.

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

"<!DOCTYPE html>\n<html lang=\"nl\"><head>\n<meta charset=\"UTF-8\">\n<title>Montisoro — Verzuimrapport · TEST (briefing-structuur)<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<meta name=\"robots\" content=\"noindex,nofollow\">\n<style>/* ═══════════════════════════════════════════════════════════════════\n   Montisoro — self-hosted fonts (WOFF2, latin subset, GDPR-conform)\n   Vervangt de Google Fonts CDN (die EU-IP's logt). Bronnen = Fontsource\n   (dezelfde Google-fontdata, SIL Open Font License) → identieke glyphs,\n   géén visueel verschil t.o.v. de vorige CDN-latin-subset.\n   Gewichten = exact wat de live CDN-links serveerden (geen weight-synthese).\n   font-display:swap voorkomt onzichtbare tekst tijdens laden (FOIT→FOUT).\n═══════════════════════════════════════════════════════════════════ */\n\n/* ── Playfair Display (display serif: titels, KPI's, em-cursief) ── */\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:400; font-display:swap;\n  src:url(\"8fe621d1-7f78-4fce-9208-bff02962c7eb\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:500; font-display:swap;\n  src:url(\"7a4e15b7-1b38-43ed-89e6-252095094b35\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:700; font-display:swap;\n  src:url(\"5585dae2-499f-4937-9708-beaeccaf6003\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:normal; font-weight:900; font-display:swap;\n  src:url(\"4d63f648-db9a-477d-a98e-50871c75396b\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:italic; font-weight:400; font-display:swap;\n  src:url(\"35ccf0d2-6c11-4c18-a495-1bdf693f690f\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:italic; font-weight:500; font-display:swap;\n  src:url(\"3d21c961-cf97-45b3-849c-2e0012a118f3\") format('woff2');\n}\n@font-face{\n  font-family:'Playfair Display'; font-style:italic; font-weight:700; font-display:swap;\n  src:url(\"2528115f-6f32-479c-91c3-8909abc2a6b3\") format('woff2');\n}\n\n/* ── DM Sans (UI sans: body, knoppen, labels) ── */\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:300; font-display:swap;\n  src:url(\"8000d707-d207-472d-b2ea-8fe92307fa4d\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:400; font-display:swap;\n  src:url(\"90184d91-656b-4c88-b156-45ef4a931305\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:500; font-display:swap;\n  src:url(\"2f820024-ea82-4811-96da-b1085472eb37\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:600; font-display:swap;\n  src:url(\"90d3396c-680a-461c-9f2e-3aafb723018a\") format('woff2');\n}\n@font-face{\n  font-family:'DM Sans'; font-style:normal; font-weight:700; font-display:swap;\n  src:url(\"31701dac-e9c0-4ac2-a3bc-25ebf464e86d\") format('woff2');\n}\n\n/* ── DM Mono (eyebrows, KPI-numerals, fineprint via --mono) ── */\n@font-face{\n  font-family:'DM Mono'; font-style:normal; font-weight:400; font-display:swap;\n  src:url(\"a3ca05b5-a7c8-42ba-bf90-bf47464668f2\") format('woff2');\n}\n@font-face{\n  font-family:'DM Mono'; font-style:normal; font-weight:500; font-display:swap;\n  src:url(\"90f861c0-de59-4795-841c-882a813be234\") format('woff2');\n}\n<\u002Fstyle>\n<style>\n/* ═══════════════════════════════════════════════════════════════\n   MONTISORO — VERZUIMRAPPORT · TEST  (volgt briefing 14/06/2026)\n   10 logische pagina's. Zelfde render-contract als productie:\n   window.__renderReport({lang, meta, vars, results}).\n   Benchmarks (kort 3,3 / middel 1,9 / lang 1,4) komen uit results.\n   PRODUCTIE ONGEMOEID — dit is een testbestand.\n═══════════════════════════════════════════════════════════════ */\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}\n:root{\n  --bg:#13100D; --page:#FBFAF8; --card:#fff;\n  --ink:#1a1512; --ink-soft:#5c534b; --ink-mute:#8a8078;\n  --off:#F0EDE8; --off-mute:rgba(240,237,232,0.60); --off-mute-2:rgba(240,237,232,0.40);\n  --orange:#E8592B; --orange-soft:#FAE8E1; --orange-deep:#a8431f;\n  --line:rgba(26,21,18,0.10); --line-2:rgba(26,21,18,0.06);\n  --line-d:rgba(240,237,232,0.12);\n  --good:#3F8F6B; --good-soft:rgba(63,143,107,0.12);\n  --warn:#C8824A;\n  --serif:'Playfair Display',Georgia,serif;\n  --sans:'DM Sans',-apple-system,sans-serif;\n  --mono:'DM Mono',ui-monospace,monospace;\n}\nhtml,body{background:#3a3631;font-family:var(--sans);color:var(--ink);-webkit-print-color-adjust:exact;print-color-adjust:exact;-webkit-font-smoothing:antialiased;}\n.page{position:relative;width:210mm;min-height:297mm;background:var(--page);overflow:hidden;display:flex;flex-direction:column;margin:0 auto;}\n.page--dark{background:var(--bg);color:var(--off);}\n.pad{flex:1;display:flex;flex-direction:column;padding:20mm 19mm 14mm;}\n@media screen{ body{padding:0;} .page{box-shadow:0 18px 50px -18px rgba(0,0,0,.5);} .page + .page{margin-top:0;} }\n@media print{ html,body{background:#fff;} .page{box-shadow:none;width:210mm;height:297mm;min-height:0;overflow:hidden;break-inside:avoid;page-break-inside:avoid;} .page:last-child{height:auto;min-height:0;break-inside:auto;page-break-inside:auto;} .page:last-child .pad{display:block;padding-bottom:14mm !important;} .pad{padding:9mm 14mm 6mm !important;} .pad .p{line-height:1.22 !important;margin-bottom:3px !important;font-size:8.8px !important;} .pad .sub-h{margin-top:5px !important;margin-bottom:2px !important;} .pad ul.clean{margin:2px 0 !important;} .pad ul.clean li{margin-bottom:1px !important;line-height:1.22 !important;font-size:8.8px !important;} .pad .t{margin-bottom:3px !important;} .pad .bmline,.pad .statpill{margin:3px 0 !important;} .pad .prionote,.pad [class*=prio]{margin-top:5px !important;padding:7px 10px !important;font-size:8.6px !important;} @page{size:A4;margin:0;} }\n\n/* head/foot */\n.ph{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:22px;}\n.page--dark .ph{border-color:var(--line-d);}\n.ph .logo{font-family:var(--sans);font-weight:600;font-style:normal;text-transform:uppercase;letter-spacing:.22em;font-size:12px;color:var(--ink);}\n.page--dark .ph .logo{color:#fff;}\n.ph .tag{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);font-family:var(--mono);}\n.page--dark .ph .tag{color:var(--off-mute);}\n.pf{display:flex;align-items:center;justify-content:space-between;padding-top:11px;border-top:1px solid var(--line);margin-top:auto;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);font-family:var(--mono);}\n.page--dark .pf{border-color:var(--line-d);color:var(--off-mute-2);}\n.pf .no{color:var(--orange);}\n\n.eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:9.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);font-family:var(--mono);}\n.eyebrow::before{content:'';width:20px;height:1.5px;background:var(--orange);}\nh2.t{font-family:var(--serif);font-weight:700;font-size:27px;line-height:1.12;letter-spacing:-.025em;color:var(--ink);margin:12px 0 8px;}\n.page--dark h2.t{color:#fff;}\nh2.t em{font-style:italic;color:var(--orange);}\n.lead{font-size:12.5px;font-weight:300;line-height:1.7;color:var(--ink-soft);max-width:64ch;}\n.page--dark .lead{color:var(--off-mute);}\n.p{font-size:11.5px;line-height:1.7;color:var(--ink-soft);margin-bottom:10px;}\n.page--dark .p{color:var(--off-mute);}\n.p strong{color:var(--ink);font-weight:600;} .page--dark .p strong{color:#fff;}\n.divlabel{display:flex;align-items:center;gap:12px;margin:18px 0 6px;font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-family:var(--mono);}\nul.clean{list-style:none;display:flex;flex-direc de risico\\u2019s en het besparingspotentieel van verzuim binnen uw organisatie.<\u002Fp>'+\n       '<div class=\"tt-meta\">'+\n         '<div><div class=\"ml\">Opgesteld voor<\u002Fdiv><div class=\"mv\">'+esc(M.company_name||'Voorbeeld NV')+'<\u002Fdiv><\u002Fdiv>'+\n         '<div><div class=\"ml\">Datum<\u002Fdiv><div class=\"mv\">'+esc(M.report_date||'')+'<\u002Fdiv><\u002Fdiv>'+\n         '<div><div class=\"ml\">Taal<\u002Fdiv><div class=\"mv\">Nederlands<\u002Fdiv><\u002Fdiv>'+\n         '<div><div class=\"ml\">Auteur<\u002Fdiv><div class=\"mv\">Montisoro BV<\u002Fdiv><\u002Fdiv>'+\n       '<\u002Fdiv><\u002Fdiv>'+\n       '<div class=\"tt-foot\"><span>Re-integrate What Matters<\u002Fspan><span>montisoro.com<\u002Fspan><\u002Fdiv>'+\n       '<\u002Fdiv><\u002Fsection>';\n\n    /* ══ P2 — EXECUTIVE SUMMARY ══ */\n    var p2='<span class=\"eyebrow\">Executive summary<\u002Fspan><h2 class=\"t\">Verzuim als <em>strategische<\u002Fem> hefboom.<\u002Fh2>'+\n      '<p class=\"p\">Dit rapport brengt de impact van verzuim binnen uw organisatie in kaart op basis van de door u aangeleverde gegevens — een onderbouwde analyse van de huidige verzuimsituatie, de financiële gevolgen en de opportuniteiten om kosten te beheersen en duurzame inzetbaarheid te versterken.<\u002Fp>'+\n      '<p class=\"p\">Verzuim raakt niet alleen de loonkost, maar ook productiviteit, operationele continuïteit, klantentevredenheid en werkdruk. Door die impact zichtbaar te maken, ondersteunt dit rapport strategische besluitvorming rond welzijn, leiderschap, personeelsbeleid en organisatieontwikkeling.<\u002Fp>'+\n      '<div class=\"divlabel\">In dit rapport vindt u<\u002Fdiv>'+\n      '<ol class=\"toc\">'+\n        '<li>Een overzicht van de ingegeven organisatie- en verzuimgegevens.<\u002Fli>'+\n        '<li>Een berekening van de directe en totale verzuimkost.<\u002Fli>'+\n        '<li>Een analyse van de kost per kalenderdag en per werkdag afwezigheid.<\u002Fli>'+\n        '<li>Een simulatie van de financiële impact en het besparingspotentieel.<\u002Fli>'+\n        '<li>Een gedetailleerde analyse van kort-, middellang- en langdurig verzuim, opgesplitst naar arbeiders en bedienden.<\u002Fli>'+\n        '<li>Strategische inzichten in de belangrijkste verzuimdrivers, risicozones en verbeterkansen.<\u002Fli>'+\n        '<li>Concrete aanbevelingen en een plan van aanpak om verzuim duurzaam te beheersen.<\u002Fli>'+\n      '<\u002Fol>'+\n      '<p class=\"p\" style=\"margin-top:14px;\"><strong>Wat gemeten wordt, kan gestuurd worden.<\u002Fstrong> Dit rapport helpt u verzuim niet enkel als kost te bekijken, maar als een strategische hefboom voor duurzame groei en operationele excellentie.<\u002Fp>';\n    H+=page(false,p2,'Executive summary','02');\n\n    /* ══ P3 — OVERZICHT INGEVOERDE GEGEVENS ══ */\n    var nArb=Math.round((I.fte||0)*(I.splitA||0)/100), nBed=(I.fte||0)-nArb;\n    function tw(g){return g==='arbeider'?'Arbeiders':g==='bediende'?'Bedienden':g==='beide'?'Beide':'—';}\n    var costRows=[\n      ['Voordelen alle aard', I.grpVoordelen, eur(I.voordelen)+' /mnd'],\n      ['Firmawagen', I.grpFirmawagen, eur(I.firmawagen)+' /mnd'],\n      ['Groepsverzekering', I.grpGroepsv, eur(I.groepsv)+' /jaar'],\n      ['Hospitalisatieverzekering', I.grpHospv, eur(I.hospv)+' /jaar'],\n      ['Andere verzekeringen', I.grpAndereverz, eur(I.andereverz)+' /jaar']\n    ];\n    var costTbl='<table class=\"tbl io-tbl\"><thead><tr><th>Doorlopende kostenpost<\u002Fth><th>Toewijzing<\u002Fth><th class=\"num\">Bedrag<\u002Fth><\u002Ftr><\u002Fthead><tbody>'+\n      costRows.map(function(r){return '<tr><td>'+r[0]+'<\u002Ftd><td>'+tw(r[1])+'<\u002Ftd><td class=\"num\">'+r[2]+'<\u002Ftd><\u002Ftr>';}).join('')+\n      '<\u002Ftbody><\u002Ftable>';\n    var verzTbl='<table class=\"tbl io-tbl\"><thead><tr><th>Verzuimtype<\u002Fth><th class=\"num\">Arbeiders<\u002Fth><th class=\"num\">Bedienden<\u002Fth><\u002Ftr><\u002Fthead><tbody>'+\n      '<tr><td>Kort &le; 1 maand<\u002Ftd><td class=\"num\">'+pct(I.kA,2)+'<\u002Ftd><td class=\"num\">'+pct(I.kB,2)+'<\u002Ftd><\u002Ftr>'+\n      '<tr><td>Middellang 1–12 maanden<\u002Ftd><td class=\"num\">'+pct(I.mA,2)+'<\u002Ftd><td class=\"num\">'+pct(I.mB,2)+'<\u002Ftd><\u002Ftr>'+\n      '<tr><td>Lang &gt; 1 jaar<\u002Ftd><td class=\"num\">'+pct(I.lA,2)+'<\u002Ftd><td class=\"num\">'+pct(I.lB,2)+'<\u002Ftd><\u002Ftr>'+\n      '<\u002Ftbody><\u002Ftable>';\n    var p3='<span class=\"eyebrow\">Stap 1 — invoer<\u002Fspan><h2 class=\"t\">Overzicht <em>ingevoerde<\u002Fem> gegevens.<\u002Fh2>'+\n      '<p class=\"lead\">De analyse vertrekt volledig van de gegevens die u hebt ingegeven. Hieronder de samenvatting.<\u002Fp>'+\n      '<div class=\"divlabel\">Organisatie<\u002Fdiv>'+\n      '<div class=\"io-grid2\">'+\n        '<div><div class=\"io-row\"><span class=\"k\">Aantal medewerkers<\u002Fspan><span class=\"v\">'+(I.fte||0)+'<\u002Fspan><\u002Fdiv>'+\n          '<div class=\"io-row\"><span class=\"k\">Arbeiders<\u002Fspan><span class=\"v\">'+nArb+' · '+(I.splitA||0)+'%<\u002Fspan><\u002Fdiv>'+\n          '<div class=\"io-row\"><span class=\"k\">Bedienden<\u002Fspan><span class=\"v\">'+nBed+' · '+(100-(I.splitA||0))+'%<\u002Fspan><\u002Fdiv><\u002Fdiv>'+\n        '<div><div class=\"io-row\"><span class=\"k\">Gemiddeld brutoloon<\u002Fspan><span class=\"v\">'+eur(I.salary)+'<\u002Fspan><\u002Fdiv>'+\n          '<div class=\"io-row\"><span class=\"k\">Netto werkdagen / jaar<\u002Fspan><span class=\"v\">'+days+'<\u002Fspan><\u002Fdiv>'+\n          '<div class=\"io-row\"><span class=\"k\">Vervangingskosten<\u002Fspan><span class=\"v\">'+(I.vervangFactor||0)+'%<\u002Fspan><\u002Fdiv>'+\n          '<div class=\"io-row\"><span class=\"k\">Organisatorische impact<\u002Fspan><span class=\"v\">'+(I.orgFactor||0)+'%<\u002Fspan><\u002Fdiv><\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"divlabel\" style=\"margin-top:26px;\">Doorlopende kosten<\u002Fdiv>'+\n      costTbl+\n      '<div class=\"divlabel\" style=\"margin-top:26px;\">Verzuimcijfers<\u002Fdiv>'+\n      verzTbl;\n    H+=page(false,p3,'Overzicht ingevoerde gegevens','03');\n\n    /* ══ P4 — DIRECTE & TOTALE KOST ══ */\n    var direct=R.werkgeverslast||R.total||0, totale=R.totaleKost||0;\n    var p4='<span class=\"eyebrow\">Stap 2 — de kost<\u002Fspan><h2 class=\"t\">Directe en totale <em>verzuimkost.<\u002Fem><\u002Fh2>'+\n      '<p class=\"lead\">Dit zijn de getallen die u moet kennen. De directe kost is wat u factureerbaar draagt; de totale kost telt ook de verloren productiviteit mee.<\u002Fp>'+\n      '<div class=\"kpi-grid\">'+\n        '<div class=\"kpi hero\"><div class=\"kl\">Jaarlijkse directe verzuimkost<\u002Fdiv><div class=\"kv\">'+eur(direct)+'<\u002Fdiv><div class=\"kn\">Loon, voordelen, verzekeringen, vervanging<\u002Fdiv><\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"subkpi\">'+\n        '<div class=\"kpi\"><div class=\"kl\">Gemiddelde kost / kalenderdag<\u002Fdiv><div class=\"kv\">'+eur(direct/365)+'<\u002Fdiv><div class=\"kn\">Directe kost ÷ 365 dagen<\u002Fdiv><\u002Fdiv>'+\n        '<div class=\"kpi\"><div class=\"kl\">Gemiddelde kost / werkdag<\u002Fdiv><div class=\"kv\">'+eur(direct/days)+'<\u002Fdiv><div class=\"kn\">Directe kost ÷ '+days+' werkdagen<\u002Fdiv><\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"kpi-grid\" style=\"margin-top:18px;\">'+\n        '<div class=\"kpi\" style=\"grid-column:1/-1;border-color:rgba(26,21,18,.16);\"><div class=\"kl\">Jaarlijkse totale verzuimkost (incl. indirecte)<\u002Fdiv><div class=\"kv\">'+eur(totale)+'<\u002Fdiv><div class=\"kn\">Directe kost + verloren productiviteit (organisatorische impact)<\u002Fdiv><\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"subkpi\">'+\n        '<div class=\"kpi\"><div class=\"kl\">Totaal / kalenderdag<\u002Fdiv><div class=\"kv\">'+eur(totale/365)+'<\u002Fdiv><div class=\"kn\">Totale kost ÷ 365 dagen<\u002Fdiv><\u002Fdiv>'+\n        '<div class=\"kpi\"><div class=\"kl\">Totaal / werkdag<\u002Fdiv><div class=\"kv\">'+eur(totale/days)+'<\u002Fdiv><div class=\"kn\">Totale kost ÷ '+days+' werkdagen<\u002Fdiv><\u002Fdiv>'+\n      '<\u002Fdiv>';\n    H+=page(false,p4,'Directe & totale verzuimkost','04');\n\n    /* ══ P5 — FINANCIËLE IMPACT SIMULATOR ══ */\n    var kk=0,mm=0,ll=0;\n    (R.categories||[]).forEach(function(c){ if(c.key==='K')kk=c.mine; if(c.key==='M')mm=c.mine; if(c.key==='L')ll=c.mine; });\n    var totR=kk+mm+ll; var kShare=totR>0?kk/totR:0, durShare=totR>0?(mm+ll)/totR:0;\n    function durSave(r){ return direct*durShare*r; }\n    function comboSave(p,r){ return direct*(kShare*p+durShare*r); }\n    function comboRate(p,r){ return totR*(1-(kShare*p+durShare*r)); }\n    function scnTable(rows){\n      return '<table class=\"tbl\"><thead><tr><th>Inschatting<\u002Fth><th class=\"num\">Duurtijd-reductie<\u002Fth><th class=\"num\">Jaarlijkse besparing<\u002Fth><\u002Ftr><\u002Fthead><tbody>'+\n        rows.map(function(r){return '<tr><td>'+r[0]+'<\u002Ftd><td class=\"num\">'+r[1]+'<\u002Ftd><td class=\"num e\">'+r[2]+'<\u002Ftd><\u002Ftr>';}).join('')+'<\u002Ftbody><\u002Ftable>';\n    }\n    var p5='<span class=\"eyebrow\">Stap 3 — simulator<\u002Fspan><h2 class=\"t\">Financiële <em>impact<\u002Fem> simulator.<\u002Fh2>'+\n      '<p class=\"lead\">Twee getallen worden vaak verward: het <strong>aantal<\u002Fstrong> medewerkers dat ziek is (instroom), en de <strong>duurtijd<\u002Fstrong> van de ziekte. Casey AI en vroege arbeidspotentiaal-inschatting werken op de duurtijd — niet op de instroom.<\u002Fp>'+\n      '<div class=\"scn hl\"><div class=\"sh\"><span class=\"stag\">Scenario A<\u002Fspan><h4>Vroege inschatting via Casey AI<\u002Fh4><\u002Fdiv>'+\n        '<p class=\"sp\">Casey AI schat het arbeidspotentieel in vanaf het eerste gesprek (week 2–4 i.p.v. week 8) en signaleert direct aan de casemanager. Taakaanpassingen starten sneller → gemiddelde ziekteduur −25–35% in 12 maanden.<\u002Fp>'+\n        scnTable([['Voorzichtig','−25%',eur(durSave(0.25))],['Realistisch','−30%',eur(durSave(0.30))],['Goed','−35%',eur(durSave(0.35))]])+'<\u002Fdiv>'+\n      '<div class=\"scn\"><div class=\"sh\"><span class=\"stag\" style=\"background:var(--ink);\">Scenario B<\u002Fspan><h4>Traditionele inschatting (week 8)<\u002Fh4><\u002Fdiv>'+\n        '<p class=\"sp\">Standaard aanpak: arbeidspotentiaal-inschatting pas vanaf week 8 (KB RIT 3.0). Zes weken later starten kost ±10 procentpunt duurtijd-reductie — het verschil tussen 15% en 25% effect.<\u002Fp>'+\n        scnTable([['Voorzichtig','−15%',eur(durSave(0.15))],['Realistisch','−20%',eur(durSave(0.20))],['Goed','−25%',eur(durSave(0.25))]])+'<\u002Fdiv>'+\n      '<div class=\"scn\"><div class=\"sh\"><span class=\"stag\">Scenario C<\u002Fspan><h4>Combinatie — Preventie + Vroege AA<\u002Fh4><\u002Fdiv>'+\n        '<p class=\"sp\">Preventie (COCC, werkdruk-analyse, korte-verzuim-aanpak) vermindert de instroom met 15–25%; Casey AI + vroege AA verkort de duurtijd met 30–38%. Beide hefbomen samen = maximale impact.<\u002Fp>'+\n        '<table class=\"tbl\"><thead><tr><th>Inschatting<\u002Fth><th class=\"num\">Verzuim % (was '+pct(totR)+')<\u002Fth><th class=\"num\">Duurtijd<\u002Fth><th class=\"num\">Jaarlijkse besparing<\u002Fth><\u002Ftr><\u002Fthead><tbody>'+\n          [['Realistisch',0.20,0.30],['Goed',0.22,0.35],['Ambitieus',0.25,0.38]].map(function(r){\n            return '<tr><td>'+r[0]+'<\u002Ftd><td class=\"num\">'+pct(comboRate(r[1],r[2]))+'<\u002Ftd><td class=\"num\">−'+Math.round(r[2]*100)+'%<\u002Ftd><td class=\"num e\">'+eur(comboSave(r[1],r[2]))+'<\u002Ftd><\u002Ftr>';\n          }).join('')+'<\u002Ftbody><\u002Ftable><\u002Fdiv>'+\n      '<p class=\"note\"><strong>Modelnota (te valideren):<\u002Fstrong> duurtijd-reductie wordt toegepast op het duurtijd-gedreven deel van de directe kost (middellang + langdurig = '+pct(durShare*100,0)+' van het verzuim); preventie op de instroom (kort). Dit is een transparant eerste model — de exacte besparingsformule stemmen we samen af.<\u002Fp>';\n    H+=page(false,p5,'Financiële impact simulator','05');\n\n    /* ══ P6-8 — DETAILANALYSE PER VERZUIMTYPE ══ */\n    function detailPage(catKey,catName,no,first){\n      var cat=(R.categories||[]).find(function(c){return c.key===catKey;})||{mine:0,avg:0};\n      var st=statusOf(cat.mine,cat.avg);\n      var block=CT[catKey][st];\n      var stLbl=st==='under'?'✓ beter dan de benchmark':st==='equal'?'∼ gelijk met de benchmark':'⚠ boven de benchmark';\n      var intro = first ? '<p class=\"lead\" style=\"margin-top:16px;margin-bottom:14px;\">De benchmark is gebaseerd op cijfers van SD Worx 2024 (LE_Verzuim_industrie) en “Ziekteverzuim in België 2025”. Per verzuimtype wordt één analyse getoond, op basis van uw ingegeven cijfers.<\u002Fp>' : '';\n      var heading='<h2 class=\"t\">'+catName+' <em>verzuim.<\u002Fem><\u002Fh2>';\n      var bm='<div class=\"bmline\">Uw percentage: <b>'+pct(cat.mine)+'<\u002Fb> &nbsp;·&nbsp; Sectorgemiddelde: <b>'+pct(cat.avg)+'<\u002Fb><\u002Fdiv>'+\n        '<div class=\"statpill '+st+'\">'+stLbl+'<\u002Fdiv>';\n      var inner='<span class=\"eyebrow\">Stap 5 — Verzuimanalyse<\u002Fspan>'+\n        (first ? intro+heading : heading)+bm+\n        block;\n      return page(false,inner,catName+' verzuim','0'+no);\n    }\n    H+=detailPage('K','Kort',6,true);\n    H+=detailPage('M','Middellang',7,false);\n    H+=detailPage('L','Langdurig',8,false);\n\n    /* ══ P9 — STRATEGISCHE INZICHTEN ══ */\n    var diff=R.differenceVsSector||0;\n    var posWord=diff>0.15?'boven':diff<-0.15?'onder':'gelijk met';\n    var risk=R.riskKey||'avg';\n    var prio=(R.rankedCategories&&R.rankedCategories[0]&&R.rankedCategories[0].label)||'middellang';\n    var riskLbl=((window.VerzuimEngine&&VerzuimEngine.RISK_LABELS&&VerzuimEngine.RISK_LABELS.nl)||{low:'Laag',avg:'Gemiddeld',elevated:'Verhoogd',high:'Hoog'})[risk];\n    var CONCL={\n      low:{lead:'Uw cijfers liggen onder het sectorgemiddelde — een sterke uitgangspositie.',body:'De grootste waarde ligt nu in behoud: veranker wat werkt en houd <strong>'+prio+'<\u002Fstrong> verzuim scherp in het oog, zodat uw voorsprong duurzaam blijft.'},\n      avg:{lead:'Uw cijfers liggen rond het sectorgemiddelde.',body:'Daarin schuilt de opportuniteit: gerichte stappen rond <strong>'+prio+'<\u002Fstrong> verzuim brengen u van “gemiddeld” naar een structurele voorsprong, met directe impact op de kost.'},\n      elevated:{lead:'Uw cijfers liggen merkbaar boven het sectorgemiddelde.',body:'Een structurele aanpak loont hier snel. De grootste hefboom ligt bij <strong>'+prio+'<\u002Fstrong> verzuim — daar valt het meeste te winnen op kost én continuïteit.'},\n      high:{lead:'Uw cijfers liggen sterk boven het sectorgemiddelde.',body:'Dit vraagt een dringende, gestructureerde aanpak. Begin bij <strong>'+prio+'<\u002Fstrong> verzuim: vandaag uw grootste risico én uw grootste besparingskans.'}\n    };\n    var cc=CONCL[risk]||CONCL.avg;\n    var p9='<span class=\"eyebrow\">Stap 6 — inzichten<\u002Fspan><h2 class=\"t\">Strategische <em>inzichten.<\u002Fem><\u002Fh2>'+\n      '<p class=\"lead\">Algemeen risiconiveau: <strong style=\"color:var(--orange-deep)\">'+riskLbl+'<\u002Fstrong>. '+cc.lead+'<\u002Fp>'+\n      '<div class=\"divlabel\">FTE-equivalent<\u002Fdiv>'+\n      '<div class=\"fte-hero\"><div class=\"fte-num\">'+pct(R.fteEquivalent,1).replace('%','')+'<\u002Fdiv>'+\n        '<div class=\"fte-txt\">Uw huidige verzuim staat gelijk aan het verlies van ongeveer <strong>'+pct(R.fteEquivalent,1).replace('%','')+' voltijdse medewerkers<\u002Fstrong> per jaar — '+ (R.lostDays||0).toLocaleString('nl-BE')+' verloren werkdagen.<\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"ctx-grid\">'+\n        '<div class=\"ctx\"><div class=\"cl\">Benchmark-context<\u002Fdiv><div class=\"cv\">U ligt <b>'+posWord+'<\u002Fb> het sectorgemiddelde, met <b>'+(diff>=0?'+':'−')+pct(Math.abs(diff)).replace('%','')+' pp<\u002Fb> (uw '+pct(R.totVerz)+' t.o.v. sector '+pct(R.sectorAverage)+').<\u002Fdiv><\u002Fdiv>'+\n        '<div class=\"ctx\"><div class=\"cl\">Cascade-risico<\u002Fdiv><div class=\"cv\">Zonder gerichte actie stromen <b>middellang<\u002Fb>-problemen door naar <b>langdurig<\u002Fb> verzuim in 6–12 maanden — de zwaarste kostenpost.<\u002Fdiv><\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"divlabel\">Besparingsscenario\\u2019s<\u002Fdiv>'+\n      '<table class=\"tbl\"><thead><tr><th>Daling verzuim<\u002Fth><th class=\"num\">Jaarlijkse besparing<\u002Fth><\u002Ftr><\u002Fthead><tbody>'+\n        '<tr><td>− 0,5 procentpunt<\u002Ftd><td class=\"num e\">'+esc(V.saving_half_percent)+'<\u002Ftd><\u002Ftr>'+\n        '<tr><td>− 1 procentpunt<\u002Ftd><td class=\"num e\">'+esc(V.saving_one_percent)+'<\u002Ftd><\u002Ftr>'+\n        '<tr><td>− 2 procentpunt<\u002Ftd><td class=\"num e\">'+esc(V.saving_two_percent)+'<\u002Ftd><\u002Ftr>'+\n      '<\u002Ftbody><\u002Ftable>';\n    H+=page(false,p9,'Strategische inzichten','09');\n\n    /* ══ P10 — AANBEVELINGEN + PLAN ══ */\n    var p10='<span class=\"eyebrow\">Stap 7 — aanbevelingen<\u002Fspan><h2 class=\"t\">Concrete <em>aanbevelingen.<\u002Fem><\u002Fh2>'+\n      '<p class=\"p\">Verzuim kost uw organisatie vandaag ongeveer <strong>'+esc(V.annual_absence_cost)+'<\u002Fstrong> per jaar. '+cc.lead+' De vraag is niet óf deze kost beïnvloedbaar is, maar in welke mate u bereid bent er actief op te sturen.<\u002Fp>'+\n      '<p class=\"p\">'+cc.body+'<\u002Fp>'+\n      '<p class=\"p\">Organisaties die verzuim succesvol terugdringen, excelleren doorgaans op drie domeinen:<\u002Fp>'+\n      '<ul class=\"clean\"><li>Inzicht in de werkelijke oorzaken van verzuim.<\u002Fli><li>Structuur in begeleiding, preventie en re-integratie.<\u002Fli><li>Sturing op basis van realtime data en voorspellende inzichten.<\u002Fli><\u002Ful>'+\n      '<div class=\"cta\"><h3>Plan van aanpak: <em>volgende stap<\u002Fem><\u002Fh3>'+\n        '<p class=\"cl\">Dit rapport geeft data. De echte waarde zit in een gericht gesprek. In 30 minuten bepalen we samen waar de grootste impact zit, welke ingrepen haalbaar zijn, en welke realistische besparingen mogelijk zijn.<\u002Fp>'+\n        '<div class=\"cta-steps\"><div>Rapport stap-voor-stap doorlopen<\u002Fdiv><div>Dieper graven in relevante cijfers<\u002Fdiv><div>Concreet actieplan uitzetten<\u002Fdiv><div>30/60/90 dagen bepalen<\u002Fdiv><\u002Fdiv>'+\n        '<div class=\"cta-contact\"><div><div class=\"l\">Telefoon<\u002Fdiv><div class=\"v\">+32 477 89 91 86<\u002Fdiv><\u002Fdiv><div><div class=\"l\">E-mail<\u002Fdiv><div class=\"v\">hello@montisoro.com<\u002Fdiv><\u002Fdiv><div><div class=\"l\">Web<\u002Fdiv><div class=\"v\">montisoro.com<\u002Fdiv><\u002Fdiv><\u002Fdiv>'+\n      '<\u002Fdiv>';\n    H+=page(false,p10,'Aanbevelingen & plan van aanpak','10');\n\n    host.innerHTML=H;\n  }\n\n  window.__renderReport=render;\n  // initial demo render\n  render(window.__MONTISORO_REPORT || null);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<script>(function(){function go(){try{if(!window.VerzuimEngine){return setTimeout(go,40);}var I={fte:250,splitA:60,salary:45000,voordelen:50,firmawagen:700,groepsv:600,hospv:400,andereverz:200,grpVoordelen:'beide',grpFirmawagen:'bediende',grpGroepsv:'bediende',grpHospv:'beide',grpAndereverz:'beide',days:220,vervangFactor:30,orgFactor:50,kA:3.3,mA:1.9,lA:1.4,kB:3.3,mB:1.9,lB:1.4};var r=window.VerzuimEngine.report(I,"nl");window.__renderReport({lang:"nl",meta:{company_name:"Voorbeeld NV",report_date:"17 juni 2026"},vars:r.vars,results:r.results});}catch(e){console.error(e);}}go();})();</script>
