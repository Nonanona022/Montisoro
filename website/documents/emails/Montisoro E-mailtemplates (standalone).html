  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er-radius:9px;padding:10px 32px 10px 14px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.08);}\n.sel::after{content:'';position:absolute;right:13px;top:50%;width:6px;height:6px;border-right:1.5px solid #8a8078;border-bottom:1.5px solid #8a8078;transform:translateY(-70%) rotate(45deg);pointer-events:none;}\n.grp{display:flex;gap:6px;background:#fff;padding:5px;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,0.08);}\n.grp button{font:600 12.5px/1 'DM Sans',sans-serif;padding:8px 14px;border:0;border-radius:7px;background:transparent;color:#5c534b;cursor:pointer;}\n.grp button.on{background:#E8592B;color:#fff;}\n.grp button:disabled{opacity:.35;cursor:not-allowed;}\n.meta-line{max-width:640px;margin:0 auto 10px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:12px;color:#5c534b;}\n.meta-line b{color:#1a1512;}\n.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a8431f;background:#FAE8E1;border-radius:5px;padding:3px 8px;}\n.frame-wrap{max-width:640px;margin:0 auto;}\niframe{width:100%;border:0;border-radius:14px;background:#e9e5df;box-shadow:0 14px 40px -16px rgba(0,0,0,0.4);}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"bar\">\n  <h1>Montisoro · e-mailpreview<\u002Fh1>\n  <div class=\"controls\">\n    <div class=\"sel\">\n      <select id=\"kindSel\">\n        <optgroup label=\"Calculator\">\n          <option value=\"customer\">Calculator · klant (met rapport)<\u002Foption>\n          <option value=\"internal\">Calculator · intern<\u002Foption>\n        <\u002Foptgroup>\n        <optgroup label=\"Bevestiging naar bezoeker\">\n          <option value=\"cc:contact\">Bevestiging · Contact<\u002Foption>\n          <option value=\"cc:fitcheck\">Bevestiging · Fit check<\u002Foption>\n          <option value=\"cc:casey\">Bevestiging · Casey<\u002Foption>\n        <\u002Foptgroup>\n        <optgroup label=\"Interne notificatie\">\n          <option value=\"fi:contact\">Intern · Contactformulier<\u002Foption>\n          <option value=\"fi:fitcheck\">Intern · Fit check<\u002Foption>\n          <option value=\"fi:casey\">Intern · Casey<\u002Foption>\n        <\u002Foptgroup>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div class=\"grp\" id=\"langGrp\">\n      <button data-lang=\"nl\" class=\"on\">NL<\u002Fbutton>\n      <button data-lang=\"en\">EN<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"meta-line\">\n  <div>Onderwerp: <b id=\"subj\">—<\u002Fb><\u002Fdiv>\n  <div id=\"langNote\"><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"frame-wrap\"><iframe id=\"mail\" title=\"email preview\"><\u002Fiframe><\u002Fdiv>\n\n<script src=\"e7627739-154e-4ff1-a689-c60a02cf65be\"><\u002Fscript>\n<script src=\"3fe69f0c-87ca-44cc-8b36-6a01b3fa0671\"><\u002Fscript>\n<script>\n(function(){\n  var state = { kind:'customer', lang:'nl' };\n  var E = window.MONTISORO_EMAILS;\n\n  function calcDemo(lang){\n    var rep = window.VerzuimEngine.report({}, lang);\n    return {\n      lang: lang, assetBase: '../..',\n      meta: { name: lang==='en' ? 'Sarah Jensen' : 'Laurence Peeters', company: lang==='en' ? 'Sample Ltd.' : 'Voorbeeld NV' },\n      vars: rep.vars,\n      contact: { name: lang==='en'?'Sarah Jensen':'Laurence Peeters', company: lang==='en'?'Sample Ltd.':'Voorbeeld NV',\n                 email:'sarah@voorbeeld.be', phone:'+32 478 12 34 56', consent:true },\n      status: { pdf:'generated', lead: lang==='en'?'new':'nieuw' },\n      dashboardUrl: '#'\n    };\n  }\n\n  var FI = {\n    contact: { title:'Nieuw contactbericht', intro:'Via het contactformulier op de website.',\n      rows:[ {label:'Naam',value:'Laurence Peeters'},{label:'Organisatie',value:'Voorbeeld NV'},\n             {label:'E-mail',value:'l@voorbeeld.be'},{label:'Telefoon',value:'+32 478 12 34 56'},\n             {label:'Bericht',value:'Graag een gesprek over verzuimbegeleiding.'} ] },\n    fitcheck: { title:'Nieuwe fit check-aanvraag', intro:'Een bezoeker rondde de fit check af.',\n      rows:[ {label:'Naam',value:'Laurence Peeters'},{label:'Organisatie',value:'Voorbeeld NV'},\n             {label:'E-mail',value:'l@voorbeeld.be'},{label:'Route',value:'Case Management'},\n             {label:'Maturiteit',value:'Niveau 2 / 4'},{label:'Schaal',value:'100 – 500 medewerkers'} ] },\n    casey: { title:'Nieuwe Casey-aanvraag', intro:'Aanvraag voor een Casey-demo.',\n      rows:[ {label:'Naam',value:'Laurence Peeters'},{label:'Organisatie',value:'Voorbeeld NV'},\n             {label:'E-mail',value:'l@voorbeeld.be'},{label:'Interesse',value:'Casey AI · demo'} ] }\n  };\n\n  function render(){\n    var out, isFormInternal = false;\n    var k = state.kind;\n    if (k === 'customer')      out = E.customer(calcDemo(state.lang));\n    else if (k === 'internal') out = E.internal(calcDemo(state.lang));\n    else if (k.indexOf('cc:') === 0){\n      out = E.customerConfirm({ lang:state.lang, assetBase:'../..', type:k.slice(3),\n        meta:{ name: state.lang==='en'?'Sarah Jensen':'Laurence Peeters', email:'sarah@voorbeeld.be' } });\n    } else { // fi:\n      isFormInternal = true;\n      var d = FI[k.slice(3)];\n      out = E.formInternal({ lang:'nl', assetBase:'../..', title:d.title, intro:d.intro, rows:d.rows });\n    }\n    document.getElementById('subj').textContent = out.subject || '— (interne notificatie, geen onderwerp)';\n    var R = window.__resources || {};\n    var bannerUrl = R.banner || '../../assets/email-banner-fit.jpg';\n    var wavesUrl  = R.waves  || '../../assets/email-footer-bg.png';\n    out.html = out.html.split('../../assets/email-banner-fit.jpg').join(bannerUrl)\n                       .split('../../assets/email-footer-bg.png').join(wavesUrl);\n    document.getElementById('langNote').innerHTML = isFormInternal\n      ? '<span class=\"tag\">altijd NL · intern team<\u002Fspan>' : '';\n    var ifr = document.getElementById('mail');\n    ifr.srcdoc = out.html;\n    ifr.onload = function(){\n      try { ifr.style.height = (ifr.contentDocument.body.scrollHeight + 4) + 'px'; } catch(e){ ifr.style.height = '900px'; }\n    };\n    // disable lang toggle for always-NL internal notifications\n    var enBtn = document.querySelector('#langGrp [data-lang=\"en\"]');\n    enBtn.disabled = isFormInternal;\n  }\n\n  document.getElementById('kindSel').addEventListener('change', function(){\n    state.kind = this.value;\n    render();\n  });\n  document.getElementById('langGrp').addEventListener('click', function(e){\n    var b = e.target.closest('[data-lang]'); if(!b || b.disabled) return;\n    state.lang = b.dataset.lang;\n    this.querySelectorAll('button').forEach(function(x){ x.classList.toggle('on', x===b); });\n    render();\n  });\n\n  render();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
