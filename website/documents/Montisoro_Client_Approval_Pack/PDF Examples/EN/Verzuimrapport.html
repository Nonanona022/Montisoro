<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#13100D;color:#F0EDE8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;line-height:1.6}
