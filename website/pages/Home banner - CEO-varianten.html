<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montisoro — Banner-varianten (CEO)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --off:#F0EDE8; --orange:#E8592B; --orange-cta:#CC4A1E; --muted-d:rgba(240,237,232,.62); --muted-d-2:rgba(240,237,232,.42);
    --sans:'DM Sans',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--sans);background:#161310;min-height:100vh;}

  /* Stage */
  .stage{position:relative;min-height:100vh;}
  .stage-frame{width:100%;height:100vh;border:0;display:block;background:#13100D;}

  /* Mobiel: EXACT iPhone 15-scherm (393 × 852px), volledig in beeld geschaald */
  .stage.mobile{display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;background:radial-gradient(circle at 50% 0%,rgba(232,89,43,.06),transparent 55%), #161310;}
  .stage.mobile .device{width:393px;height:852px;flex:0 0 auto;border-radius:16px;overflow:hidden;box-shadow:0 34px 90px -30px rgba(0,0,0,.75);outline:1px solid rgba(240,237,232,.14);transform-origin:center center;background:#13100D;position:relative;padding:0;}
  .stage.mobile .device::before{display:none;}
  .stage.mobile .stage-frame{width:393px;height:852px;border-radius:0;}
  .stage-cap{display:none;}
  .stage.mobile .stage-cap{display:block;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-d);}

  /* ── PANEEL ── */
  .vx{position:fixed;top:18px;right:18px;z-index:9999;width:290px;background:rgba(18,15,12,.95);backdrop-filter:blur(16px) saturate(1.3);border:1px solid rgba(240,237,232,.14);border-radius:16px;box-shadow:0 24px 60px -14px rgba(0,0,0,.6);overflow:hidden;transition:transform .35s cubic-bezier(.16,1,.3,1);}
  .vx.collapsed{transform:translateX(calc(100% + 26px));}
  .vx-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid rgba(240,237,232,.1);}
  .vx-head h3{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);}
  .vx-x{width:26px;height:26px;border-radius:8px;background:rgba(240,237,232,.1);border:none;color:var(--off);cursor:pointer;font-size:15px;line-height:1;}
  .vx-body{padding:16px 18px 20px;display:flex;flex-direction:column;gap:18px;max-height:84vh;overflow:auto;}
  .vx-group label.g{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-d);margin-bottom:9px;}
  .vx-seg{display:flex;flex-direction:column;gap:6px;}
  .vx-seg.row{flex-direction:row;gap:8px;}
  .vx-seg.row button{flex:1;text-align:center;}
  .vx-seg button{text-align:left;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--off);background:rgba(240,237,232,.05);border:1px solid rgba(240,237,232,.12);border-radius:9px;padding:9px 12px;cursor:pointer;transition:all .18s ease;}
  .vx-seg button:hover{border-color:rgba(232,89,43,.5);}
  .vx-seg button.on{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600;}
  .vx-seg button .h{font-weight:600;}
  .vx-seg button small{display:block;font-size:11px;font-weight:400;opacity:.72;margin-top:2px;line-height:1.35;}
  .vx-toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px;color:var(--off);}
  .vx-sw{width:42px;height:24px;border-radius:100px;background:rgba(240,237,232,.18);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
  .vx-sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;}
  .vx-sw.on{background:var(--orange);}
  .vx-sw.on::after{transform:translateX(18px);}
  .vx-sel{width:100%;font-family:var(--sans);font-size:12.5px;color:var(--off);background:rgba(240,237,232,.05);border:1px solid rgba(240,237,232,.14);border-radius:9px;padding:9px 11px;cursor:pointer;}
  .vx-sel option{background:#1a1512;}
  .vx-note{font-size:11px;color:var(--muted-d-2);line-height:1.5;border-top:1px solid rgba(240,237,232,.1);padding-top:14px;}
  .vx-tab{position:fixed;top:18px;right:18px;z-index:9998;background:var(--orange-cta);color:#fff;border:none;border-radius:100px;padding:11px 18px;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.06em;cursor:pointer;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);display:none;}
  .vx.collapsed ~ .vx-tab{display:block;}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="device">
    <iframe class="stage-frame" id="frame" src="_banner-frame.html" title="Banner-preview"></iframe>
  </div>
  <span class="stage-cap">iPhone 15 · 393 × 852px</span>
</div>

<aside class="vx" id="vx">
  <div class="vx-head">
    <h3>Banner-varianten</h3>
    <button class="vx-x" id="collapseBtn" title="Verberg paneel" aria-label="Verberg paneel">✕</button>
  </div>
  <div class="vx-body">
    <div class="vx-group">
      <label class="g">Weergave</label>
      <div class="vx-seg row" id="segView">
        <button data-view="desktop" class="on">Desktop</button>
        <button data-view="mobile">Mobiel</button>
      </div>
    </div>

    <div class="vx-group">
      <label class="g">Wat voegen we toe?</label>
      <div class="vx-seg" id="segVariant">
        <button data-v="slogan"><span class="h">Alleen slogan</span><small>Huidige situatie — CEO weet niet wat/voor wie.</small></button>
        <button data-v="eyebrow"><span class="h">+ Bovenkop</span><small>Eén regel boven de slogan: wat &amp; voor wie.</small></button>
        <button data-v="promise"><span class="h">+ Belofte-regel</span><small>CEO-oneliner onder de slogan: het resultaat.</small></button>
        <button data-v="both" class="on"><span class="h">Bovenkop + Belofte</span><small>Aanbevolen — wat, voor wie én resultaat in 10&nbsp;sec.</small></button>
      </div>
    </div>

    <div class="vx-group">
      <label class="g">Bovenkop-tekst</label>
      <select class="vx-sel" id="selEyebrow">
        <option value="0">Verzuimbegeleiding &amp; re-integratie voor Belgische werkgevers</option>
        <option value="1">Voor werkgevers met langdurig &amp; frequent verzuim</option>
        <option value="2">Regie over verzuim — voor HR &amp; directie in België</option>
      </select>
    </div>

    <div class="vx-group">
      <label class="g">Belofte-tekst</label>
      <select class="vx-sel" id="selPromise">
        <option value="0">Minder lange uitval. Sneller terug aan het werk — zonder dat het op HR neerkomt.</option>
        <option value="1">Montisoro neemt de regie over langdurig verzuim — met mensen, structuur én technologie.</option>
        <option value="2">Gemiddeld 30–35% kortere verzuimduur — onderbouwd, niet beloofd.</option>
      </select>
    </div>

    <div class="vx-group">
      <div class="vx-toggle"><span>Bronregel bij de cijfers</span><button class="vx-sw on" id="swSource" aria-label="Bronregel aan/uit"></button></div>
    </div>

    <p class="vx-note">Slogan en cijfers blijven ongewijzigd — dit toont alleen wat we <b>toevoegen</b>. Wissel boven tussen <b>Desktop</b> en <b>Mobiel</b>. Kies een richting → ik voer 'm daarna (na jouw akkoord) door op de echte Home, NL + EN.</p>
  </div>
</aside>
<button class="vx-tab" id="showBtn">Varianten ▸</button>

<script>
(function(){
  var stage=document.getElementById('stage'), vx=document.getElementById('vx'), frame=document.getElementById('frame');
  var state={variant:'both', eyebrowIdx:0, promiseIdx:0, source:true};
  function send(){ frame.contentWindow && frame.contentWindow.postMessage(Object.assign({type:'tweak'},state),'*'); }

  // frame meldt zich → stuur huidige staat
  window.addEventListener('message', function(e){ if((e.data||{}).type==='frame-ready') send(); });

  // Weergave desktop/mobiel
  document.getElementById('segView').addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return;
    this.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
    stage.classList.toggle('mobile', b.getAttribute('data-view')==='mobile');
    fitMobile();
  });
  var device=document.querySelector('.device');
  function fitMobile(){
    if(stage.classList.contains('mobile')){
      var s=Math.min(1,(window.innerHeight-40)/852);
      device.style.transform='scale('+s+')';
    } else { device.style.transform=''; }
  }
  window.addEventListener('resize', fitMobile);
  // Variant
  document.getElementById('segVariant').addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return;
    this.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
    state.variant=b.getAttribute('data-v'); send();
  });
  document.getElementById('selEyebrow').addEventListener('change', function(){ state.eyebrowIdx=+this.value; send(); });
  document.getElementById('selPromise').addEventListener('change', function(){ state.promiseIdx=+this.value; send(); });
  document.getElementById('swSource').addEventListener('click', function(){ this.classList.toggle('on'); state.source=this.classList.contains('on'); send(); });
  document.getElementById('collapseBtn').addEventListener('click', function(){ vx.classList.add('collapsed'); });
  document.getElementById('showBtn').addEventListener('click', function(){ vx.classList.remove('collapsed'); });

  // fallback: stuur staat ook bij load (mocht 'frame-ready' gemist zijn)
  frame.addEventListener('load', function(){ setTimeout(send,120); });
})();
</script>
</body>
</html>
