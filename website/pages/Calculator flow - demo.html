<!DOCTYPE html>
<html lang="nl">
<head>
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8">
<title>Verzuimcalculator — flow-demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../stylesheets/fonts.css">
<style>
:root{
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,-apple-system,sans-serif;
  --orange:#E8592B; --orange-cta:#CC4A1E; --ink:#1A1512; --ink-soft:#52493F; --ink-mute:#6E6359;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:#F4F2EF;color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6;}

.cd-wrap{max-width:1120px;margin:0 auto;padding:26px 20px 96px;}

/* ── topbar ── */
.cd-topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid rgba(26,21,18,.10);}
.cd-kicker{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;}
.cd-h1{font-family:var(--serif);font-weight:700;font-size:clamp(24px,3.4vw,34px);color:var(--ink);line-height:1.1;letter-spacing:-.01em;}
.cd-h1-sub{font-size:14px;color:var(--ink-soft);margin-top:8px;max-width:60ch;}
.cd-badge{font-size:11px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-soft);border:1px solid rgba(26,21,18,.20);border-radius:100px;padding:6px 14px;white-space:nowrap;}
.cd-hint{font-size:12.5px;color:var(--ink-mute);margin-bottom:26px;display:inline-flex;align-items:center;gap:8px;}
.cd-hint b{color:var(--ink);font-weight:600;}
.cd-hint .cd-kbd{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);}

/* ── stage grids ── */
.cd-stage.cd-live{display:grid;grid-template-columns:1fr 1.3fr;gap:24px;align-items:start;}
.cd-stage.cd-live .cd-col-preview{position:sticky;top:20px;}
.cd-stage.cd-reveal{display:grid;grid-template-columns:1fr 1.15fr;gap:24px;align-items:start;animation:cdFade .45s cubic-bezier(.16,1,.3,1);}
.cd-stage.cd-wizardonly{max-width:600px;margin:0 auto;}
@keyframes cdFade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@media(max-width:820px){
  .cd-stage.cd-live,.cd-stage.cd-reveal{grid-template-columns:1fr;}
  .cd-stage.cd-live .cd-col-preview{position:static;}
}

/* compact (GSM) → altijd één kolom */
.cd-stage.cd-c{display:block!important;max-width:none;}
.cd-stage.cd-c .cd-col-preview{position:static!important;margin-bottom:14px;}
.cd-stage.cd-c .cd-col-report{margin-top:14px;}

/* ── PREVIEW (donker) ── */
.cd-preview{background:#13100D;border:1px solid rgba(240,237,232,.12);border-radius:16px;padding:22px 20px 20px;box-shadow:0 16px 40px -24px rgba(0,0,0,.5);color:#F0EDE8;}
.cd-pv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cd-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--orange);}
.cd-eyebrow::before{content:'';width:18px;height:1.5px;background:var(--orange);}
.cd-eyebrow.on-light{color:var(--orange);}
.cd-chip{font-size:11px;color:rgba(240,237,232,.66);border:1px solid rgba(240,237,232,.12);border-radius:100px;padding:4px 10px;}
.cd-result{font-family:var(--serif);font-weight:700;font-size:clamp(42px,7vw,64px);line-height:.95;letter-spacing:-.03em;color:#fff;display:flex;align-items:baseline;gap:5px;margin-bottom:12px;font-feature-settings:"tnum";}
.cd-result .cur{color:var(--orange);font-style:italic;font-size:.5em;font-weight:400;}
.cd-preview.cd-c .cd-result{font-size:44px;}
.cd-empty-hint{display:flex;align-items:center;gap:9px;font-size:12.5px;color:rgba(240,237,232,.82);background:rgba(232,89,43,.07);border:1px solid rgba(232,89,43,.32);border-radius:10px;padding:11px 13px;margin-bottom:16px;line-height:1.5;}
.cd-empty-hint .cd-dot{width:9px;height:9px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.cd-verzpct{display:flex;align-items:baseline;gap:11px;margin:-2px 0 16px;padding-bottom:14px;border-bottom:1px solid rgba(240,237,232,.12);}
.cd-verzpct .vp-val{font-family:var(--serif);font-weight:700;font-size:30px;color:#fff;font-feature-settings:"tnum";}
.cd-verzpct .vp-val .pct{color:var(--orange);font-style:italic;font-size:.55em;}
.cd-verzpct .vp-lbl{font-size:13px;color:rgba(240,237,232,.82);}
.cd-cfo{border:1px solid rgba(240,237,232,.12);border-radius:12px;padding:12px 14px;margin-bottom:16px;background:rgba(240,237,232,.02);}
.cd-cfo-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:7px 0;font-size:13px;}
.cd-cfo-row + .cd-cfo-row{border-top:1px solid rgba(240,237,232,.12);}
.cd-cfo-row .lbl{color:rgba(240,237,232,.82);}
.cd-cfo-row .val{font-weight:600;color:#fff;font-feature-settings:"tnum";white-space:nowrap;}
.cd-cfo-row.is-core .lbl{color:#F0EDE8;font-weight:500;}
.cd-cfo-row.is-core .val{color:var(--orange);}
.cd-cfo-row.is-total{padding-top:10px;}
.cd-cfo-row.is-total .lbl,.cd-cfo-row.is-total .val{font-size:14px;font-weight:700;}
.cd-bar{display:flex;height:6px;border-radius:100px;overflow:hidden;background:rgba(240,237,232,.06);margin-bottom:14px;}
.cd-seg{display:block;transition:width .4s cubic-bezier(.16,1,.3,1);}
.cd-seg-0{background:var(--orange);} .cd-seg-1{background:#C8824A;} .cd-seg-2{background:#9c7a52;} .cd-seg-3{background:rgba(240,237,232,.32);}
.cd-kpis{display:grid;grid-template-columns:1fr 1fr;gap:0 22px;}
.cd-kpi{border-top:1px solid rgba(240,237,232,.12);padding:12px 0 2px;}
.cd-kpi .k-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(240,237,232,.66);margin-bottom:6px;}
.cd-kpi .k-val{font-weight:600;font-size:20px;color:#fff;display:flex;align-items:baseline;gap:3px;font-feature-settings:"tnum";}
.cd-kpi .k-val .cur{color:var(--orange);font-style:italic;font-size:.65em;}
.cd-kpi .k-val small{font-size:.5em;color:rgba(240,237,232,.66);}
.cd-report-cta{margin-top:18px;width:100%;}

/* ── WIZARD (licht) ── */
.cd-wizard{background:#fff;border:1px solid rgba(26,21,18,.12);border-radius:16px;padding:24px 22px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.cd-stepper{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.cd-step-dot{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(26,21,18,.18);background:#fff;color:var(--ink-mute);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--sans);font-feature-settings:"tnum";transition:all .2s;}
.cd-step-dot.is-active{background:var(--ink);border-color:var(--ink);color:#fff;}
.cd-step-dot.is-done{border-color:var(--orange);color:var(--orange);}
.cd-panel-title{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--ink);margin-bottom:6px;}
.cd-panel-lead{font-size:14px;color:var(--ink-soft);line-height:1.6;margin-bottom:20px;}
.cd-controls{min-height:96px;}
.cd-field{display:block;}
.cd-field-lbl{display:block;font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--ink-soft);margin-bottom:8px;}
.cd-field-box{display:flex;align-items:center;border:1.5px solid rgba(26,21,18,.20);border-radius:10px;overflow:hidden;background:#fff;transition:border-color .2s,box-shadow .2s;}
.cd-field-box:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,89,43,.16);}
.cd-field-box input{flex:1;border:none;outline:none;padding:14px;font-family:var(--sans);font-size:18px;font-weight:600;color:var(--ink);min-width:0;font-feature-settings:"tnum";background:transparent;}
.cd-affix{color:var(--ink-mute);font-weight:600;padding-left:14px;}
.cd-affix-r{padding:0 14px 0 4px;}
.cd-slider{display:block;}
.cd-slider-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.cd-slider-val{font-family:var(--serif);font-weight:700;color:var(--orange);font-size:22px;font-feature-settings:"tnum";}
.cd-slider input[type=range]{width:100%;accent-color:var(--orange);height:4px;}
.cd-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:12px;}
.cd-done-note{font-size:12.5px;color:var(--ink-mute);text-align:right;flex:1;}
.cd-btn{display:inline-flex;align-items:center;justify-content:center;padding:13px 26px;border-radius:100px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;text-decoration:none;}
.cd-btn-primary{background:var(--orange-cta);color:#fff;border-color:var(--orange-cta);}
.cd-btn-primary:hover{background:#b8401a;transform:translateY(-1px);}
.cd-btn-ghost{background:transparent;color:var(--ink-soft);border-color:rgba(26,21,18,.20);}
.cd-btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.cd-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── REPORT (reveal) ── */
.cd-report{background:#fff;border:1px solid rgba(26,21,18,.12);border-radius:16px;padding:24px 22px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.cd-report-title{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--ink);margin:8px 0 16px;line-height:1.15;}
.cd-rep-row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid rgba(26,21,18,.08);font-size:14px;color:var(--ink-soft);}
.cd-rep-row b{color:var(--ink);font-feature-settings:"tnum";font-weight:600;}
.cd-rep-row.is-total{border-bottom:2px solid var(--ink);}
.cd-rep-row.is-total b{color:var(--orange);font-size:16px;}
.cd-again{margin-top:18px;}

/* ── GSM holder ── */
.cd-gsm-holder{display:flex;justify-content:center;padding:8px 0 0;}
.cd-gsm-inner{padding:62px 12px 28px;min-height:100%;background:#F4F2EF;}
.cd-gsm-inner .cd-panel-title{font-size:19px;}
.cd-gsm-inner .cd-wizard,.cd-gsm-inner .cd-preview,.cd-gsm-inner .cd-report{border-radius:14px;}

/* ── tweak option-cards (toont alle opties volledig) ── */
.cd-optlist{display:flex;flex-direction:column;gap:8px;padding:2px 0 4px;}
.cd-opt{display:flex;gap:11px;align-items:flex-start;text-align:left;width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid rgba(240,237,232,.14);background:rgba(240,237,232,.03);color:#F0EDE8;cursor:pointer;transition:border-color .15s,background .15s;font-family:inherit;}
.cd-opt:hover{border-color:rgba(240,237,232,.30);background:rgba(240,237,232,.06);}
.cd-opt.is-on{border-color:var(--orange);background:rgba(232,89,43,.11);}
.cd-opt-radio{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(240,237,232,.42);flex-shrink:0;margin-top:2px;position:relative;transition:border-color .15s;}
.cd-opt.is-on .cd-opt-radio{border-color:var(--orange);}
.cd-opt.is-on .cd-opt-radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--orange);}
.cd-opt-body{display:flex;flex-direction:column;gap:3px;min-width:0;}
.cd-opt-title{font-size:12.5px;font-weight:600;color:#fff;letter-spacing:.01em;}
.cd-opt-desc{font-size:11px;line-height:1.46;color:rgba(240,237,232,.66);}

/* ── Tweaks-paneel → zwart, compact & leesbaar (override licht starter-thema) ── */
.twk-panel{background:#141210!important;color:#F0EDE8!important;border:.5px solid rgba(240,237,232,.16)!important;box-shadow:0 12px 40px rgba(0,0,0,.55)!important;width:246px!important;font-size:11px!important;}
.twk-hd b{color:#fff!important;}
.twk-x{color:rgba(240,237,232,.6)!important;}
.twk-x:hover{background:rgba(240,237,232,.12)!important;color:#fff!important;}
.twk-sect{color:rgba(240,237,232,.5)!important;}
.twk-lbl{color:rgba(240,237,232,.75)!important;}
.twk-body::-webkit-scrollbar-thumb{background:rgba(240,237,232,.22)!important;}

/* ── PDF-formulier (reveal-variant D) ── */
.cd-pdf{background:#fff;border:1px solid rgba(26,21,18,.12);border-radius:16px;padding:24px 22px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.cd-pdf-title{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--ink);margin:8px 0 6px;line-height:1.15;}
.cd-pdf-lead{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin-bottom:18px;}
.cd-pf-grid{display:flex;flex-direction:column;gap:13px;}
.cd-pf-field{display:flex;flex-direction:column;gap:6px;}
.cd-pf-field label{font-size:11.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;}
.cd-opt-tag{font-weight:400;color:var(--ink-mute);text-transform:none;letter-spacing:0;}
.cd-pf-field input{border:1.5px solid rgba(26,21,18,.20);border-radius:10px;padding:11px 13px;font-family:var(--sans);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;background:#fff;}
.cd-pf-field input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,89,43,.14);}
.cd-pf-consent{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--ink-soft);line-height:1.5;margin-top:2px;}
.cd-pf-consent input{margin-top:2px;accent-color:var(--orange);width:15px;height:15px;flex-shrink:0;}
.cd-pf-consent a{color:var(--orange);}
.cd-pf-submit{margin-top:18px;width:100%;}
.cd-pf-back{display:block;width:100%;margin-top:12px;text-align:center;font-size:12.5px;color:var(--ink-mute);background:none;border:none;cursor:pointer;font-family:var(--sans);}
.cd-pf-back:hover{color:var(--ink);}
.cd-pdf-sent{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:16px 8px 8px;}
.cd-pdf-sent .cd-check{width:52px;height:52px;border-radius:50%;background:rgba(31,122,77,.12);color:#1F7A4D;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;}
.cd-pdf-sent h4{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--ink);}
.cd-pdf-sent p{font-size:13px;color:var(--ink-soft);line-height:1.55;max-width:36ch;}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="calc-demo-mock.jsx"></script>
<script type="text/babel">
const VARIANTS = {
  A: { title: 'Live naast de stappen', desc: 'De preview beweegt live mee tijdens elke stap — dit is de huidige calculator.' },
  B: { title: 'Stappen → eind-reveal', desc: 'Alleen de stappen tijdens het invullen; het volledige rapport + preview verschijnen pas op "Bekijk resultaat".' },
  C: { title: 'Responsief (aanbevolen)', desc: 'Desktop: live naast de stappen. GSM: rustig stappen invullen → volledig rapport op het einde.' },
  D: { title: 'Stappen → resultaat + PDF', desc: 'Alleen de stappen; op het einde het live-berekende kader naast een formulier waar de klant de gegevens invult om het PDF-rapport te ontvangen.' },
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "D",
  "device": "desktop"
}/*EDITMODE-END*/;

function OptionList({ value, options, onChange }) {
  return (
    <div className="cd-optlist" role="radiogroup">
      {options.map((o) => (
        <button key={o.value} type="button" role="radio" aria-checked={o.value === value}
                className={'cd-opt' + (o.value === value ? ' is-on' : '')}
                onClick={() => onChange(o.value)}>
          <span className="cd-opt-radio" aria-hidden="true" />
          <span className="cd-opt-body">
            <span className="cd-opt-title">{o.title}</span>
            <span className="cd-opt-desc">{o.desc}</span>
          </span>
        </button>
      ))}
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const variant = VARIANTS[t.variant] ? t.variant : 'A';
  const isPhone = t.device === 'gsm';
  const mode = (variant === 'A') ? 'live' : (variant === 'C') ? (isPhone ? 'wizard' : 'live') : 'wizard';
  const revealKind = variant === 'D' ? 'form' : 'report';
  const v = VARIANTS[variant];

  const mock = <CalcMock mode={mode} compact={isPhone} revealKind={revealKind} key={variant + '-' + t.device} />;

  return (
    <div className="cd-wrap">
      <header className="cd-topbar">
        <div>
          <div className="cd-kicker">Verzuimcalculator · flow-demo</div>
          <h1 className="cd-h1">{v.title}</h1>
          <p className="cd-h1-sub">{v.desc}</p>
        </div>
        <div className="cd-badge">{isPhone ? 'GSM' : 'Desktop'}</div>
      </header>

      <p className="cd-hint"><span className="cd-kbd" /> Open het <b>Tweaks</b>-paneel (rechtsboven) om tussen de varianten en de GSM-weergave te wisselen.</p>

      {isPhone
        ? <div className="cd-gsm-holder"><IOSDevice><div className="cd-gsm-inner">{mock}</div></IOSDevice></div>
        : <div className="cd-desktop">{mock}</div>}

      <TweaksPanel>
        <TweakSection label="Flow-variant" />
        <OptionList value={t.variant} onChange={(val) => setTweak('variant', val)}
          options={[
            { value: 'A', title: 'A · Live naast de stappen', desc: 'Preview beweegt live mee bij elke stap — de huidige calculator.' },
            { value: 'B', title: 'B · Stappen → eind-reveal', desc: 'Alleen de stappen; rapport + preview verschijnen op “Bekijk resultaat”.' },
            { value: 'C', title: 'C · Responsief (aanbevolen)', desc: 'Desktop: live naast de stappen. GSM: stappen → eind-reveal.' },
            { value: 'D', title: 'D · Stappen → resultaat + PDF', desc: 'Alleen de stappen; einde = live kader + formulier voor de gegevens → PDF-rapport.' },
          ]} />
        <TweakSection label="Weergave" />
        <OptionList value={t.device} onChange={(val) => setTweak('device', val)}
          options={[
            { value: 'desktop', title: 'Desktop', desc: 'Volledige breedte — twee kolommen naast elkaar.' },
            { value: 'gsm', title: 'GSM', desc: 'Telefoonweergave in een iPhone-frame.' },
          ]} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
