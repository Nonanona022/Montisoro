  status = 301
  force = true
[[redirects]]
  from = "/referentie-case-alcon-en"
  to = "/reference-case-alcon-en"
  status = 301
  force = true
[[redirects]]
  from = "/referentie-case-feneko-en"
  to = "/reference-case-feneko-en"
  status = 301
  force = true
[[redirects]]
  from = "/referentie-case-lonza-en"
  to = "/reference-case-lonza-en"
  status = 301
  force = true
[[redirects]]
  from = "/referentie-case-novartis-en"
  to = "/reference-case-novartis-en"
  status = 301
  force = true

# Legacy .html blijft werken (200-serve; canonical dedupt naar extensieloos)
[[redirects]]
  from = "/:slug.html"
  to = "/pages/:slug.html"
  status = 200

# Generieke extensieloze schone URL (/aanpak, /about-en, /referentie-case-…)
[[redirects]]
  from = "/:slug"
  to = "/pages/:slug.html"
  status = 200

# ═══════════════════════════════════════════════════════════════════
# Deploy contexts — beta-first workflow (Regel 2)
# ───────────────────────────────────────────────────────────────────
# Production = the "production" branch → live site (montisoro.com).
# Staging    = the "staging" branch → beta deploy reviewers approve on
#              BEFORE merging to production. This is the beta context.
# Branch/PR deploys = any other branch or pull request → treated as non-prod.
#
# DEPLOY_ENV is the only value safe to commit here. ALL real secrets
# (RESEND_API_KEY, SUPABASE_URL/SERVICE_ROLE_KEY, ALLOWED_ORIGIN, base URLs…)
# are scoped PER CONTEXT in the Netlify UI — never in this file.
# ⚠ Staging MUST point at a SEPARATE Supabase project/bucket and a test
#   Resend setup, so beta tests never touch production leads/PDFs or mail
#   real customers. See project-docs/staging.md.
# ═══════════════════════════════════════════════════════════════════

[context.production.environment]
  DEPLOY_ENV = "production"

[context.staging.environment]
  DEPLOY_ENV = "staging"

[context.branch-deploy.environment]
  DEPLOY_ENV = "staging"

[context.deploy-preview.environment]
  DEPLOY_ENV = "preview"
