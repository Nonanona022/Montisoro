# ═══════════════════════════════════════════════════════════════════
# SEO — SCHONE, EXTENSIELOZE, KLEINE-LETTER URL's (canoniek)
# Canonical + hreflang + sitemap wijzen naar /aanpak, /faq, /home-en, …
# (extensieloos, lowercase). Deze 301's canonicaliseren legacy/.html/
# mixed-case → de schone URL. Volgorde: specifieke 301's VÓÓR generieke
# rewrites (Netlify = first-match-wins). Geen loop: 200-rewrite-targets
# (/pages/*) worden direct geserveerd, niet opnieuw door de regels gehaald.
# ═══════════════════════════════════════════════════════════════════
# Home = "/" ; mixed-case pagina's → lowercase extensieloos
[[redirects]]
  from = "/Home.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/Home-en.html"
  to = "/home-en"
  status = 301
  force = true

[[redirects]]
  from = "/FAQ.html"
  to = "/faq"
  status = 301
  force = true

[[redirects]]
  from = "/FAQ-en.html"
  to = "/faq-en"
  status = 301
  force = true

[[redirects]]
  from = "/Referentie.html"
  to = "/referentie"
  status = 301
  force = true

[[redirects]]
  from = "/Referentie-en.html"
  to = "/references-en"
  status = 301
  force = true

[[redirects]]
  from = "/pages/Home.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/pages/Home"
  to = "/"
  status = 301
  force = true

# Overige: /pages/X(.html) én /X.html → schone extensieloze /X
[[redirects]]
  from = "/pages/:slug.html"
  to = "/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/pages/:slug"
  to = "/:slug"
  status = 301
  force = true

# ═══════════════════════════════════════════════════════════════════
# SCHONE URL's SERVEREN (200 rewrite — URL blijft schoon, geen hop)
# ═══════════════════════════════════════════════════════════════════
[[redirects]]
  from = "/"
  to = "/pages/Home.html"
  status = 200
  force = true

[[redirects]]
  from = "/home-en"
  to = "/pages/Home-en.html"
  status = 200
  force = true

[[redirects]]
  from = "/faq"
  to = "/pages/FAQ.html"
  status = 200
  force = true

[[redirects]]
  from = "/faq-en"
  to = "/pages/FAQ-en.html"
  status = 200
  force = true

[[redirects]]
  from = "/referentie"
  to = "/pages/Referentie.html"
  status = 200
  force = true

[[redirects]]
  from = "/referentie-en"
  to = "/references-en"
  status = 301
  force = true

[[redirects]]
  from = "/references-en"
  to = "/pages/references-en.html"
  status = 200
  force = true

# ── EN-slugs verengelst (oud NL-slug + -en → Engelse slug, 301) ──
[[redirects]]
  from = "/aanpak-en"
  to = "/approach-en"
  status = 301
  force = true
[[redirects]]
  from = "/technologie-en"
  to = "/technology-en"
  status = 301
  force = true
[[redirects]]
  from = "/referentie-case-en"
