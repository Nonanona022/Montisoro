# ═══════════════════════════════════════════════════════════════════
# Montisoro — Netlify configuration (FASE 2 backend)
# ═══════════════════════════════════════════════════════════════════

[build]
  # Static site — geen build-stap nodig.
  publish = "website"
  functions = "netlify/functions"

# Secrets scanning: publieke URL's zijn geen geheimen
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SITE_BASE_URL,ALLOWED_ORIGIN,MAIL_FROM,INTERNAL_NOTIFY_EMAIL"

[functions]
  # esbuild bundles the JS; bundle the shared engine, PDF template and logo
  # so the serverless function can read them at runtime.
  node_bundler = "esbuild"
  included_files = [
    "website/services/verzuim-engine.js",
    "website/services/email-templates.js",
    "website/config/calculator-params.js",
    "website/documents/verzuimrapport-test-report.html",
    "website/documents/verzuimrapport-test-report-en.html",
    "website/documents/verzuimrapport-test.content.js",
    "website/documents/verzuimrapport-test-en.content.js",
    "website/stylesheets/fonts.css",
    "website/assets/fonts/*.woff2",
    "website/assets/montisoro-logo.png",
    "website/assets/montisoro-logo-dark.png",
    "website/assets/montisoro-wordmark-dark.png"
  ]

[functions."calculator-report"]
  # chromium binary is large — give it room and time. ⚠️ This per-function
  # included_files REPLACES the global [functions] list for THIS function, so it
  # must ALSO list every file _lib/pdf.js reads at runtime (report template +
  # engine + params + fonts) — otherwise renderPdf throws ENOENT (HTTP 500).
  included_files = [
    "node_modules/@sparticuz/chromium/**",
    "website/services/verzuim-engine.js",
    "website/config/calculator-params.js",
    "website/documents/verzuimrapport-test-report.html",
    "website/documents/verzuimrapport-test-report-en.html",
    "website/documents/verzuimrapport-test.content.js",
    "website/documents/verzuimrapport-test-en.content.js",
    "website/stylesheets/fonts.css",
    "website/assets/fonts/*.woff2"
  ]

# Analyse-module: nachtelijke rollup events → daily_metrics (#6 schaal)
# Draait elke nacht om 03:15 UTC (± 04:15/05:15 Brussel). Herberekent de
# laatste 3 dagen (vangt nakomende events). Handmatig triggeren kan via
# /api/metrics-rollup?days=N (idempotent).
[functions."metrics-rollup"]
  schedule = "15 3 * * *"

# Friendly endpoint alias
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

