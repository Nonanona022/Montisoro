# ═══════════════════════════════════════════════════════════════════
# SEO — DUBBELE URL's CONSOLIDEREN (301 naar de canonieke schone URL)
# /pages/* en /Home.html mogen niet als aparte indexeerbare kopie blijven
# bestaan naast de schone URL's. 301 → één canonieke versie per pagina.
# Volgorde: deze specifieke 301's staan VÓÓR de generieke rewrites hieronder,
# zodat ze eerst matchen (Netlify = first-match-wins). Geen loop: de rewrite-
# targets (/pages/*) worden direct geserveerd, niet opnieuw door de regels gehaald.
# ═══════════════════════════════════════════════════════════════════
# Home heeft één canonieke URL: "/"
[[redirects]]
  from = "/Home.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/pages/Home.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/pages/Home"
  to = "/"
  status = 301
  force = true

# Overige pagina's: /pages/X(.html) → schone /X.html
[[redirects]]
  from = "/pages/:slug.html"
  to = "/:slug.html"
  status = 301
  force = true

[[redirects]]
  from = "/pages/:slug"
  to = "/:slug.html"
  status = 301
  force = true

# ═══════════════════════════════════════════════════════════════════
# SCHONE URL's — serveer /pages/* op de root (montisoro.com/about-en.html)
# zodat canonical + hreflang + sitemap (allemaal /X.html) kloppen met wat
# Netlify echt serveert. 200 = rewrite (URL blijft schoon, geen redirect-hop).
# ═══════════════════════════════════════════════════════════════════
# Homepage → Home.html (force: overschrijft de noindex index.html splash)
[[redirects]]
  from = "/"
  to = "/pages/Home.html"
  status = 200
  force = true

# Elke /X.html op de root → /pages/X.html (vangt about-en.html, calculator.html, …)
[[redirects]]
  from = "/:slug.html"
  to = "/pages/:slug.html"
  status = 200

# ═══════════════════════════════════════════════════════════════════
# Deploy contexts — beta-first workflow (Regel 2)
# ───────────────────────────────────────────────────────────────────
# Production = the "production" branch → live site (montisoro.com).
# Staging    = the "staging" branch → beta deploy reviewers approve on
#              BEFORE merging to production. This is the beta context.
# Branch/PR deploys = any other branch or pull request → treated as non-prod.
#
# DEPLOY_ENV is the only value safe to commit here. ALL real secrets
# (RESEND_API_KEY, SUPABASE_URL/SERVICE_ROLE_KEY, ALLOWED_ORIGIN, base URLs…)
# are scoped PER CONTEXT in the Netlify UI — never in this file.
# ⚠ Staging MUST point at a SEPARATE Supabase project/bucket and a test
#   Resend setup, so beta tests never touch production leads/PDFs or mail
#   real customers. See project-docs/staging.md.
# ═══════════════════════════════════════════════════════════════════

[context.production.environment]
  DEPLOY_ENV = "production"

[context.staging.environment]
  DEPLOY_ENV = "staging"

[context.branch-deploy.environment]
  DEPLOY_ENV = "staging"

[context.deploy-preview.environment]
  DEPLOY_ENV = "preview"
